<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="js/registro.js" defer></script>
</head>
<body>

<form id="registro">

    <h1>Regístrate</h1>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" required autofocus>

    <label for="email">Email:</label>
    <input type="email" id="email" required multiple>

    <label for="url">Web:</label>
    <input type="url" id="url" placeholder="http://ejemplo.com">

    <label for="password1">Contraseña:</label>
    <input type="password" id="password1" required pattern="\S{6,}">

    <label for="password2">Repite contraseña:</label>
	<input type="password" id="password2" required>
	<span id="errorPassword"></span>

    <label for="conocimientos">Nivel HTML (1-10):</label>
    <input type="range" id="conocimientos" min="1" max="10" value="5">

    <label for="fechaInicio">Fecha inicio:</label>
    <input type="date" id="fechaInicio" required>

    <label for="cantidad">Cantidad (1-5):</label>
    <input type="number" id="cantidad" min="1" max="5" value="1">

    <button type="submit">Enviar</button>

</form>

</body>
</html>
